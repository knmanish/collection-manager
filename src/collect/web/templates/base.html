<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}collect{% endblock %}</title>
  <style>
    :root{
      --bg:#f6f7f9; --surface:#ffffff; --line:#e4e7ec; --txt:#1a1d24;
      --muted:#667085; --accent:#2f6feb; --accent-soft:#eaf1fe;
      --danger:#b42318; --danger-soft:#fef3f2; --ok:#067647; --ok-soft:#ecfdf3;
      --radius:12px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--txt);
      font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    .nav{background:var(--surface);border-bottom:1px solid var(--line);
      position:sticky;top:0;z-index:10}
    .nav-inner{max-width:1080px;margin:0 auto;padding:14px 20px;
      display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .brand{font-weight:700;font-size:18px;letter-spacing:-.01em}
    .brand span{color:var(--accent)}
    .nav a.link{color:var(--muted);font-weight:500}
    .nav a.link.active{color:var(--txt)}
    .nav a.link:hover{text-decoration:none;color:var(--txt)}
    .spacer{margin-left:auto}
    .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
    .seg button{border:none;background:var(--surface);color:var(--muted);
      padding:6px 14px;font:inherit;font-weight:600;cursor:pointer}
    .seg button.on{background:var(--accent);color:#fff}
    .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 64px}
    h1{font-size:24px;margin:0 0 2px;letter-spacing:-.01em}
    .sub{color:var(--muted);margin:0 0 22px}
    .flash{padding:11px 16px;border-radius:10px;margin-bottom:14px;font-weight:500}
    .flash.success{background:var(--ok-soft);color:var(--ok)}
    .flash.error{background:var(--danger-soft);color:var(--danger)}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}
    .btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);
      color:#fff;border:none;padding:9px 16px;border-radius:9px;font:inherit;
      font-weight:600;cursor:pointer}
    .btn:hover{filter:brightness(.95);text-decoration:none}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
    .btn.ghost:hover{background:var(--bg);color:var(--txt)}
    .btn.sm{padding:5px 11px;font-size:13px}
    .btn.danger{background:transparent;color:var(--danger);border:1px solid #f3c7c2}
    .btn.danger:hover{background:var(--danger-soft)}
    input,select,textarea{background:var(--surface);border:1px solid var(--line);
      color:var(--txt);padding:9px 11px;border-radius:9px;font:inherit;width:100%}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-soft)}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
    th{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
    tr:last-child td{border-bottom:none}
    .pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;
      background:var(--accent-soft);color:var(--accent)}
    .right{text-align:right}
    .muted{color:var(--muted)}
    .tiny{font-size:12px}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="brand">collect<span>.</span></div>
      <a class="link {{ 'active' if request.endpoint=='index' }}" href="{{ url_for('index') }}">Collection</a>
      <a class="link {{ 'active' if request.endpoint=='summary' }}" href="{{ url_for('summary') }}">Summary</a>
      <a class="link {{ 'active' if request.endpoint=='categories' }}" href="{{ url_for('categories') }}">Categories</a>
      <div class="spacer"></div>
      <form method="post" action="{{ url_for('set_currency') }}" class="seg">
        <input type="hidden" name="csrf" value="{{ csrf_token }}">
        <input type="hidden" name="next" value="{{ request.full_path }}">
        {% for c in supported_currencies %}
        <button name="currency" value="{{ c }}" class="{{ 'on' if c == display_currency }}">{{ c }}</button>
        {% endfor %}
      </form>
    </div>
  </nav>
  <div class="wrap">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block body %}{% endblock %}
  </div>
</body>
</html>
